<header class="header" [class.scrolled]="isScrolled">
  <div class="container header-container">
    <div class="logo">
      <a routerLink="/" (click)="closeMenu()" style="display: flex; align-items: center;">
        <img src="/images/logo.png" alt="Centro Estético Belleza 100%" class="logo-img"
          style="height: 85px; width: auto; object-fit: contain; display: block; margin: 0; padding: 0;">
      </a>
    </div>

    <!-- Hamburger button for mobile -->
    <button class="menu-toggle" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="Abrir menú de navegación">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav class="nav" [class.open]="isMenuOpen">
      <ul class="nav-list">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
            (click)="closeMenu()">Inicio</a>
        </li>
        <li>
          <a routerLink="/quienes-somos" routerLinkActive="active" (click)="closeMenu()">Quiénes somos</a>
        </li>
        <li>
          <a routerLink="/tratamientos" routerLinkActive="active" (click)="closeMenu()">Tratamientos</a>
        </li>
        <li>
          <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">Contacto</a>
        </li>
      </ul>
      <div class="nav-actions">
        <a href="https://adtbeauty.net/centroesteticodebelleza100/online" target="_blank" mat-flat-button
          color="primary" class="btn-premium" (click)="closeMenu()">Reservar cita online</a>
      </div>
    </nav>
  </div>
</header>
